spring.application.name=arl-backend

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/arl_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
# spring.datasource.password=Ainasafa12.@

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8080

# Better Error Messages (Helpful during development)
server.error.include-message=always
server.error.include-stacktrace=never

# Admin Credential
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN